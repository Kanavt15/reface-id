<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REface - Loading</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    
    .splash-container {
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      border-radius: 16px;
      padding: 50px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .logo {
      font-size: 48px;
      font-weight: 700;
      color: #e94560;
      margin-bottom: 10px;
      letter-spacing: 4px;
    }
    
    .logo span {
      color: #ffffff;
    }
    
    .subtitle {
      color: #8892b0;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    
    .loader {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin: 0 auto 20px;
    }
    
    .loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #e94560, #0f3460);
      border-radius: 2px;
      animation: loading 2s ease-in-out forwards;
    }
    
    @keyframes loading {
      0% { width: 0%; }
      20% { width: 20%; }
      50% { width: 60%; }
      80% { width: 80%; }
      100% { width: 100%; }
    }
    
    .status {
      color: #64ffda;
      font-size: 12px;
      letter-spacing: 1px;
    }
    
    .disclaimer {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      color: #ffd700;
      font-size: 10px;
      max-width: 300px;
      line-height: 1.5;
    }
    
    .disclaimer-icon {
      font-size: 16px;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo">RE<span>face</span></div>
    <div class="subtitle">Forensic Facial Reconstruction</div>
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
    <div class="status">Initializing 3D Engine...</div>
    <div class="disclaimer">
      <div class="disclaimer-icon">⚠️</div>
      Forensic Facial Approximation Only<br>
      Not for Identity Verification
    </div>
  </div>
</body>
</html>
